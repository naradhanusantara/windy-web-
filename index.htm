<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio Modern | Windy Web</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="preloader"></div>

    <header>
        <nav>
            <div class="logo">windy Web</div>
            <ul>
                <li><a href="#beranda">Beranda</a></li>
                <li><a href="#tentang">Tentang</a></li>
                <li><a href="#projek">Projek</a></li>
                <li><a href="#kontak">Kontak</a></li>
            </ul>
        </nav>
    </header>

    <section id="tentang" class="hero">
        <div class="hero-content">
            <img src="img/profil.png" alt="Profil Saya" class="profile-img">
            <h1>Tentang Saya</h1>
            <p>hi im a programer i like create a web :></p>
        </div>
    </section>

    <section id="projek" class="projects">
        <h2>Projek Terbaru</h2>
        <div class="project-grid">
            <div class="project-card">
                <img src="img/project1.jpg" alt="Project 1">
                <h3>Project Satu</h3>
                <p>Lihat detail project ini →</p>
            </div>
            <div class="project-card">
                <img src="img/project2.jpg" alt="Project 2">
                <h3>Project Dua</h3>
                <p>Lihat detail project ini →</p>
            </div>
            <div class="project-card">
                <img src="img/project3.jpg" alt="Project 3">
                <h3>Project Tiga</h3>
                <p>Lihat detail project ini →</p>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
